name: CI 检查 + Netlify 部署
on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  quality:
    name: 质量检查
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
          standalone: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm run lint

      - name: TypeScript 类型检查
        run: pnpm run typecheck

      - name: 单元测试 + 覆盖率
        run: pnpm run test:coverage
        env:
          NODE_ENV: test

      - name: 上传覆盖率报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: 生产构建
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
          standalone: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: 生产构建
        run: pnpm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SOURCE_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SOURCE_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_RESOURCE_LIBRARY_API_KEY: ${{ secrets.NEXT_PUBLIC_RESOURCE_LIBRARY_API_KEY }}
          RESOURCE_LIBRARY_SERVICE_ROLE_KEY: ${{ secrets.RESOURCE_LIBRARY_SERVICE_ROLE_KEY }}

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .next/
          retention-days: 3

  e2e:
    name: E2E 测试
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
          standalone: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: 生产构建
        run: pnpm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SOURCE_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SOURCE_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_RESOURCE_LIBRARY_API_KEY: ${{ secrets.NEXT_PUBLIC_RESOURCE_LIBRARY_API_KEY }}
          RESOURCE_LIBRARY_SERVICE_ROLE_KEY: ${{ secrets.RESOURCE_LIBRARY_SERVICE_ROLE_KEY }}

      - name: 安装 Playwright 浏览器
        run: npx playwright install --with-deps chromium

      - name: 启动生产服务器
        run: |
          pnpm start -p 3264 &
          sleep 10
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SOURCE_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SOURCE_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_RESOURCE_LIBRARY_API_KEY: ${{ secrets.NEXT_PUBLIC_RESOURCE_LIBRARY_API_KEY }}
          RESOURCE_LIBRARY_SERVICE_ROLE_KEY: ${{ secrets.RESOURCE_LIBRARY_SERVICE_ROLE_KEY }}

      - name: 健康检查
        run: |
          echo "=== Supabase URL check ==="
          [ -n "$NEXT_PUBLIC_SUPABASE_URL" ] && echo "URL set (not empty)" || echo "URL NOT SET"
          curl -s -o /dev/null -w "HTTP %{http_code}\n" http://localhost:3264/ || echo "FAILED"
          curl -s http://localhost:3264/ | grep -o '搜索站点\|页面遇到了\|page-goto\|Suspense\|Error' || echo "NO_MARKERS_FOUND"

      - name: 运行 E2E 测试（chromium + mobile-chrome）
        run: pnpm run e2e
        env:
          E2E_BASE_URL: http://localhost:3264

      - name: 上传 E2E 测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: playwright-report/
          retention-days: 7

  deploy:
    name: 等待 Netlify 部署
    runs-on: ubuntu-latest
    needs: [quality, build, e2e]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    timeout-minutes: 10
    permissions:
      contents: write
    environment:
      name: production
      url: ${{ steps.deploy.outputs.deploy-url }}
    steps:
      - uses: actions/checkout@v4

      - name: 同步到 Netlify 生产分支
        id: mirror
        run: |
          set -euo pipefail
          mirror_time="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "mirror-time=$mirror_time" >> "$GITHUB_OUTPUT"
          git push --porcelain origin "${GITHUB_SHA}:refs/heads/main"

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 等待 Netlify Git 部署
        id: deploy
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID || vars.NETLIFY_SITE_ID }}
          NETLIFY_DEPLOY_BRANCH: main
          NETLIFY_DEPLOY_CREATED_AFTER: ${{ steps.mirror.outputs.mirror-time }}
        run: |
          set -euo pipefail
          : "${NETLIFY_AUTH_TOKEN:?NETLIFY_AUTH_TOKEN is not set}"
          : "${NETLIFY_SITE_ID:?NETLIFY_SITE_ID is not set}"
          node scripts/wait-netlify-deploy.mjs

  link-check:
    name: 链接健康检测
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
          standalone: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: 运行链接健康检测
        continue-on-error: true
        run: pnpm run check:links
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SOURCE_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SOURCE_SUPABASE_ANON_KEY }}

      - name: 上传链接检测报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-check-report
          path: link-check-report-*.md
          retention-days: 14
